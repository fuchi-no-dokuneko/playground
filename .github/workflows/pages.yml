name: Build and deploy pages

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run pages:build

      - name: Run browser smoke test
        shell: bash
        run: |
          browser="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          if [[ -z "$browser" ]]; then
            npx playwright install --with-deps chromium
          fi

          python3 -m http.server 4173 --directory dist >/tmp/playground-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 1
          done

          PLAYWRIGHT_CHROMIUM_EXECUTABLE="$browser" npm run smoke:render

      - name: Upload static site
        uses: actions/upload-artifact@v7
        with:
          name: playground-dist
          path: dist
          if-no-files-found: error

  github-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download static site
        uses: actions/download-artifact@v8
        with:
          name: playground-dist
          path: dist

      - name: Configure GitHub Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Report disabled GitHub Pages
        if: steps.configure.outcome == 'failure'
        run: echo '::warning::GitHub Pages must be enabled with GitHub Actions as its source in the repository settings.'

      - name: Package GitHub Pages artifact
        if: steps.configure.outcome == 'success'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: steps.configure.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v5

  cloudflare-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://tensor-playground-research.pages.dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Download static site
        uses: actions/download-artifact@v8
        with:
          name: playground-dist
          path: dist

      - name: Report missing Cloudflare credentials
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: echo 'Cloudflare deployment skipped because repository secrets are not configured.'

      - name: Deploy Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=tensor-playground-research --branch=master
